<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>Selamat</title>
  <link href="https://fonts.googleapis.com/css2?family=Mali:wght@400;700&display=swap" rel="stylesheet">
  <style>
    /* RESET */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Mali', cursive;
    }

    body {
      background: #FFFEEE;
      overflow: hidden;
    }

    .container {
      position: relative;
      height: 100vh;
      width: 100vw;
    }

    /* ================= TEXT ================= */
    .content {
      position: relative;
      z-index: 10;
      text-align: center;
      padding-top: 40px;
    }

    h1 {
      font-size: clamp(60px, 10vw, 90px);
      color: #f4a62a;
      text-shadow: 3px 3px 0 #fff, 6px 6px 0 rgba(0,0,0,0.1);
    }

    p {
      font-size: clamp(25px, 5vw, 40px);
      color: #4c4c9d;
      margin-bottom: 10px;
    }

    #skor-teks {
      font-size: 50px;
      font-weight: bold;
      color: #f72585;
      margin-top: 10px;
    }

    /* AREA BINTANG */
    .stars {
      display: flex;
      justify-content: center;
      gap: 40px;
      margin-top: 50px;
    }

    .star {
      position: relative;
      width: 200px;
      height: 200px;
    }

    /* Bintang Abu-abu (Dasar) */
    .star-bg {
      width: 100%;
      filter: grayscale(1) opacity(0.3);
      position: absolute;
      top: 0; left: 0;
    }

    /* Bintang Kuning (Isi) */
    .star-fill {
      width: 100%;
      position: absolute;
      top: 0; left: 0;
      overflow: hidden; /* Ini kunci buat bintang setengah */
      width: 0%; /* Default kosong, diisi pakai JS */
      transition: width 1.5s ease-out;
    }
/* ================= RUMPUT (MEMENUHI LAYAR BAWAH) ================= */
    .grass {
      position: absolute;
      bottom: -20px; /* Posisi pas di bawah */
      width: 55%;    /* Diperlebar agar bertemu di tengah */
      z-index: 20;
      pointer-events: none;
    }

    .grass.left { left: 0; }
    .grass.right { 
      right: 0; 
      transform: scaleX(-1); /* Balik gambar agar variatif */
    }

    /* ================= ANIMASI BINTANG (LEBIH PELAN) ================= */
    .star img {
      width: 200px;
      filter: drop-shadow(0 10px 15px rgba(0,0,0,0.1));
      /* Durasi diubah jadi 3 detik agar gerakannya tenang/slow */
      animation: bounce 3s ease-in-out infinite;
    }

    @keyframes bounce {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-20px); } /* Pantulan tidak terlalu tinggi */
    }

    /* ================= DEKORASI ================= */
    .sun { position: absolute; width: 130px; top: 20px; right: 40px; z-index: 2; }
    .cloud { position: absolute; z-index: 1; opacity: 0.8; animation: float 6s ease-in-out infinite; }
    .c1 { width: 180px; top: 30px; left: 5%; }
    .c2 { width: 140px; top: 120px; left: 20%; animation-delay: 1s; }
    .c3 { width: 200px; top: 40px; right: 8%; animation-delay: 0.5s; }

    @keyframes float { 0%, 100% { transform: translateX(0); } 50% { transform: translateX(25px); } }

    /* KONFETI */
    .confetti-container { position: absolute; width: 100%; height: 100%; top: 0; left: 0; pointer-events: none; z-index: 5; }
    .confetti { position: absolute; width: 12px; height: 12px; animation: fall 4s linear infinite; }
    @keyframes fall { 0% { transform: translateY(-10vh) rotate(0deg); opacity: 1; } 100% { transform: translateY(110vh) rotate(360deg); opacity: 0; } }
  </style>
</head>
<body>

<div class="container">
  <img src="assets/images/sun.png" class="sun" alt="Matahari">
  <img src="assets/images/cloud.png" class="cloud c1" alt="Awan">
  <img src="assets/images/cloud.png" class="cloud c2" alt="Awan">
  <img src="assets/images/cloud.png" class="cloud c3" alt="Awan">

  <div class="content">
    <h1>Selamat!</h1>
    <p>Kamu berhasil menjawab <span id="soal-benar">0</span> dari 6 soal</p>
    <div id="skor-teks">SKOR: 0</div>

    <div class="stars">
      <!-- Bintang 1 -->
      <div class="star">
        <img src="assets/images/star.png" class="star-bg">
        <div class="star-fill" id="fill-1"><img src="assets/images/star.png"></div>
      </div>
      <!-- Bintang 2 -->
      <div class="star">
        <img src="assets/images/star.png" class="star-bg">
        <div class="star-fill" id="fill-2"><img src="assets/images/star.png"></div>
      </div>
      <!-- Bintang 3 -->
      <div class="star">
        <img src="assets/images/star.png" class="star-bg">
        <div class="star-fill" id="fill-3"><img src="assets/images/star.png"></div>
      </div>
    </div>
  </div>

  <img src="assets/images/rumput.png" class="grass left" alt="Rumput">
  <img src="assets/images/rumput.png" class="grass right" alt="Rumput">

  <div class="confetti-container" id="confetti-box"></div>
</div>

<script>
  window.onload = function() {
    // 1. Ambil data soal benar dari localStorage (pastikan di kuis kamu simpan data ini)
    let soalBenar = parseInt(localStorage.getItem('totalBintang')) || 0;
    if(soalBenar > 6) soalBenar = 6; // Maksimal 6 soal

    // 2. Update Teks Soal & Skor (1 point = 2 nilai)
    document.getElementById('soal-benar').innerText = soalBenar;
    let skor = soalBenar * 2; 
    document.getElementById('skor-teks').innerText = "SKOR: " + skor;

    // 3. Logika Isi Bintang (1 bintang = 2 soal)
    // starValue adalah berapa persen tiap bintang harus terisi
    let starValues = [0, 0, 0];

    for (let i = 0; i < 3; i++) {
        if (soalBenar >= (i + 1) * 2) {
            starValues[i] = 100; // Penuh (bernilai 2 soal)
        } else if (soalBenar === (i * 2) + 1) {
            starValues[i] = 50;  // Setengah (ganjil)
        } else {
            starValues[i] = 0;   // Kosong
        }
    }

    // Jalankan animasi pengisian bintang
    setTimeout(() => {
      document.getElementById('fill-1').style.width = starValues[0] + "%";
      document.getElementById('fill-2').style.width = starValues[1] + "%";
      document.getElementById('fill-3').style.width = starValues[2] + "%";
    }, 500);

    // 4. Munculkan Konfeti Otomatis
    const container = document.getElementById('confetti-box');
    const warna = ['#ff6b6b', '#4d96ff', '#6bcB77', '#ffd93d', '#f72585'];
    
    for (let i = 0; i < 30; i++) {
      let div = document.createElement('div');
      div.className = 'confetti';
      div.style.left = Math.random() * 100 + "%";
      div.style.backgroundColor = warna[Math.floor(Math.random() * warna.length)];
      div.style.animationDelay = Math.random() * 3 + "s";
      container.appendChild(div);
    }
  };
</script>

</body>
</html>
